<?xml version="1.0" encoding="UTF-8"?>
<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- App icon with rounded background -->
  <!-- For macOS dock, Windows taskbar, etc. -->

  <defs>
    <linearGradient id="appIconBg" x1="10" y1="10" x2="110" y2="110">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="10" y="10" width="100" height="100" rx="22" fill="url(#appIconBg)"/>

  <!-- Row 1 -->
  <rect x="25" y="25" width="20" height="20" rx="4" fill="#39d353"/>
  <rect x="50" y="25" width="20" height="20" rx="4" fill="#39d353" opacity="0.7"/>
  <rect x="75" y="25" width="20" height="20" rx="4" fill="#39d353" opacity="0.4"/>

  <!-- Row 2 -->
  <rect x="25" y="50" width="20" height="20" rx="4" fill="#39d353" opacity="0.7"/>
  <rect x="50" y="50" width="20" height="20" rx="4" fill="#FF6B6B"/>
  <rect x="75" y="50" width="20" height="20" rx="4" fill="#39d353" opacity="0.7"/>

  <!-- Row 3 -->
  <rect x="25" y="75" width="20" height="20" rx="4" fill="#39d353" opacity="0.4"/>
  <rect x="50" y="75" width="20" height="20" rx="4" fill="#39d353" opacity="0.7"/>
  <rect x="75" y="75" width="20" height="20" rx="4" fill="#39d353"/>

  <!-- Conductor icon (play arrow + baton) -->
  <path d="M56 56 L62 60 L56 64" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="62" y1="60" x2="70" y2="60" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
</svg>
