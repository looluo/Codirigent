name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            ext: .exe

          - name: macOS Intel
            runner: macos-14
            target: x86_64-apple-darwin
            archive: tar.gz
            ext: ""

          - name: macOS Apple Silicon
            runner: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
            ext: ""

          - name: Linux x64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Linux: install system dependencies for GPUI (Vulkan, X11, Wayland, fonts)
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake pkg-config clang \
            libssl-dev libfontconfig-dev libfreetype6-dev \
            libvulkan-dev \
            libx11-dev libx11-xcb-dev libxcb-render0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libwayland-dev wayland-protocols \
            libasound2-dev libzstd-dev libgit2-dev libsqlite3-dev \
            libstdc++-12-dev

      - name: Build
        run: cargo build --profile dist --features gpui-full --target ${{ matrix.target }}

      - name: Determine version
        id: meta
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "archive_name=codirigent-v${GITHUB_REF_NAME#v}-${{ matrix.target }}" >> "$GITHUB_OUTPUT"
          # WiX requires x.x.x.x (integers only) — strip any prerelease suffix
          MSI_VERSION="${VERSION%%-*}"
          echo "msi_version=${MSI_VERSION}.0" >> "$GITHUB_OUTPUT"

      # ── Archives (all platforms) ──────────────────────────────────────

      - name: Package (Windows zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          mkdir -p dist staging
          cp "target/${{ matrix.target }}/dist/codirigent${{ matrix.ext }}" staging/
          cd staging && 7z a "../dist/${{ steps.meta.outputs.archive_name }}.zip" .

      - name: Package (Unix tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist staging
          cp "target/${{ matrix.target }}/dist/codirigent${{ matrix.ext }}" staging/
          cd staging && tar czf "../dist/${{ steps.meta.outputs.archive_name }}.tar.gz" .

      # ── Windows MSI installer ─────────────────────────────────────────

      - name: Generate License.rtf
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $text = Get-Content LICENSE -Raw
          $escaped = $text -replace '\\','\\' -replace '\{','\{' -replace '\}','\}'
          $lines = $escaped -split "`r?`n"
          $body = ($lines | ForEach-Object { $_ + '\par' }) -join "`r`n"
          $rtf = "{\rtf1\ansi\deff0{\fonttbl{\f0\fmodern Consolas;}}`r`n\f0\fs16`r`n" + $body + "`r`n}"
          [System.IO.File]::WriteAllText("wix\License.rtf", $rtf, [System.Text.Encoding]::ASCII)

      - name: Add WiX to PATH
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          echo "${env:WIX}bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Build MSI installer
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          set VERSION=${{ steps.meta.outputs.msi_version }}
          set BINARY_PATH=target\${{ matrix.target }}\dist
          candle.exe -dBinaryPath=%BINARY_PATH% -dVersion=%VERSION% -dLicensePath=wix\License.rtf -arch x64 wix\main.wxs -o wix\main.wixobj
          light.exe -ext WixUIExtension wix\main.wixobj -o dist\${{ steps.meta.outputs.archive_name }}.msi

      # ── macOS DMG installer ───────────────────────────────────────────

      - name: Create macOS app bundle and DMG
        if: runner.os == 'macOS'
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          BUNDLE="Codirigent.app"

          # Create .app bundle structure
          mkdir -p "${BUNDLE}/Contents/MacOS"
          mkdir -p "${BUNDLE}/Contents/Resources"
          cp "target/${{ matrix.target }}/dist/codirigent" "${BUNDLE}/Contents/MacOS/"

          # Info.plist
          cat > "${BUNDLE}/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key><string>en</string>
              <key>CFBundleExecutable</key><string>codirigent</string>
              <key>CFBundleIconFile</key><string>AppIcon</string>
              <key>CFBundleIdentifier</key><string>com.codirigent.app</string>
              <key>CFBundleInfoDictionaryVersion</key><string>6.0</string>
              <key>CFBundleName</key><string>Codirigent</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>${VERSION}</string>
              <key>CFBundleVersion</key><string>${VERSION}</string>
              <key>LSMinimumSystemVersion</key><string>13.0</string>
              <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST

          # Generate .icns from PNG
          ICON_SRC="assets/icons/app-icon-preview.png"
          ICONSET="AppIcon.iconset"
          mkdir -p "${ICONSET}"
          sips -z 16 16     "${ICON_SRC}" --out "${ICONSET}/icon_16x16.png"
          sips -z 32 32     "${ICON_SRC}" --out "${ICONSET}/icon_16x16@2x.png"
          sips -z 32 32     "${ICON_SRC}" --out "${ICONSET}/icon_32x32.png"
          sips -z 64 64     "${ICON_SRC}" --out "${ICONSET}/icon_32x32@2x.png"
          sips -z 128 128   "${ICON_SRC}" --out "${ICONSET}/icon_128x128.png"
          sips -z 256 256   "${ICON_SRC}" --out "${ICONSET}/icon_128x128@2x.png"
          sips -z 256 256   "${ICON_SRC}" --out "${ICONSET}/icon_256x256.png"
          sips -z 512 512   "${ICON_SRC}" --out "${ICONSET}/icon_256x256@2x.png"
          sips -z 512 512   "${ICON_SRC}" --out "${ICONSET}/icon_512x512.png"
          sips -z 1024 1024 "${ICON_SRC}" --out "${ICONSET}/icon_512x512@2x.png"
          iconutil -c icns "${ICONSET}" -o "${BUNDLE}/Contents/Resources/AppIcon.icns"

          # Create DMG with Applications symlink (drag-to-install)
          mkdir -p dmg-staging
          cp -r "${BUNDLE}" dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "Codirigent" -srcfolder dmg-staging -ov -format UDZO \
            "dist/${{ steps.meta.outputs.archive_name }}.dmg"

      # ── Upload all artifacts ──────────────────────────────────────────

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "artifacts/*"
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          generateReleaseNotes: true
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
