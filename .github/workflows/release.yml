name: Release

permissions:
  actions: write
  contents: write

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: sccache

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            ext: .exe

          - name: macOS Apple Silicon
            runner: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}
          cache-targets: "false"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Set workspace version from tag
        shell: bash
        run: |
          export VERSION="${GITHUB_REF_NAME#v}"
          python3 -c "
          import os, re, pathlib
          v = os.environ['VERSION']
          p = pathlib.Path('Cargo.toml')
          txt = p.read_text()
          txt = re.sub(
              r'(\[workspace\.package\]\s*\nversion\s*=\s*)\"[^\"]*\"',
              rf'\1\"{v}\"',
              txt,
              count=1,
          )
          p.write_text(txt)
          "
          cargo generate-lockfile

      - name: Build binaries
        run: |
          cargo build --profile dist --features gpui-full --target ${{ matrix.target }} -p codirigent
          cargo build --profile dist --target ${{ matrix.target }} -p codirigent-hook

      - name: Determine version
        id: meta
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "archive_name=codirigent-v${GITHUB_REF_NAME#v}-${{ matrix.target }}" >> "$GITHUB_OUTPUT"
          # WiX requires x.x.x.x (integers only) — strip any prerelease suffix
          MSI_VERSION="${VERSION%%-*}"
          echo "msi_version=${MSI_VERSION}.0" >> "$GITHUB_OUTPUT"

      # ── Archives (all platforms) ──────────────────────────────────────

      - name: Package (Windows zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          mkdir -p dist staging
          cp "target/${{ matrix.target }}/dist/codirigent${{ matrix.ext }}" staging/
          cp "target/${{ matrix.target }}/dist/codirigent-hook${{ matrix.ext }}" staging/
          cd staging && 7z a "../dist/${{ steps.meta.outputs.archive_name }}.zip" .

      - name: Package (Unix tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist staging
          cp "target/${{ matrix.target }}/dist/codirigent${{ matrix.ext }}" staging/
          cp "target/${{ matrix.target }}/dist/codirigent-hook${{ matrix.ext }}" staging/
          cd staging && tar czf "../dist/${{ steps.meta.outputs.archive_name }}.tar.gz" .

      # ── Windows MSI installer ─────────────────────────────────────────

      - name: Generate License.rtf
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $text = Get-Content LICENSE -Raw
          $escaped = $text -replace '\\','\\' -replace '\{','\{' -replace '\}','\}'
          $lines = $escaped -split "`r?`n"
          $body = ($lines | ForEach-Object { $_ + '\par' }) -join "`r`n"
          $rtf = "{\rtf1\ansi\deff0{\fonttbl{\f0\fmodern Consolas;}}`r`n\f0\fs16`r`n" + $body + "`r`n}"
          [System.IO.File]::WriteAllText("wix\License.rtf", $rtf, [System.Text.Encoding]::ASCII)

      - name: Add WiX to PATH
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          echo "${env:WIX}bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Build MSI installer
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          set VERSION=${{ steps.meta.outputs.msi_version }}
          set BINARY_PATH=target\${{ matrix.target }}\dist
          candle.exe -dBinaryPath=%BINARY_PATH% -dVersion=%VERSION% -dLicensePath=wix\License.rtf -arch x64 wix\main.wxs -o wix\main.wixobj
          light.exe -ext WixUIExtension wix\main.wixobj -o dist\${{ steps.meta.outputs.archive_name }}.msi

      # ── macOS DMG installer ───────────────────────────────────────────

      - name: Import macOS certificate
        if: runner.os == 'macOS'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$MACOS_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import "$RUNNER_TEMP/certificate.p12" -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

      - name: Create macOS app bundle and DMG
        if: runner.os == 'macOS'
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          BUNDLE="Codirigent.app"

          # Create .app bundle structure
          mkdir -p "${BUNDLE}/Contents/MacOS"
          mkdir -p "${BUNDLE}/Contents/Resources"
          cp "target/${{ matrix.target }}/dist/codirigent" "${BUNDLE}/Contents/MacOS/"
          cp "target/${{ matrix.target }}/dist/codirigent-hook" "${BUNDLE}/Contents/MacOS/"

          # Info.plist
          cat > "${BUNDLE}/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key><string>en</string>
              <key>CFBundleExecutable</key><string>codirigent</string>
              <key>CFBundleIconFile</key><string>AppIcon</string>
              <key>CFBundleIdentifier</key><string>com.codirigent.app</string>
              <key>CFBundleInfoDictionaryVersion</key><string>6.0</string>
              <key>CFBundleName</key><string>Codirigent</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>${VERSION}</string>
              <key>CFBundleVersion</key><string>${VERSION}</string>
              <key>LSMinimumSystemVersion</key><string>13.0</string>
              <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST

          # Generate .icns from PNG
          ICON_SRC="assets/icons/app-icon-preview.png"
          ICONSET="AppIcon.iconset"
          mkdir -p "${ICONSET}"
          sips -z 16 16     "${ICON_SRC}" --out "${ICONSET}/icon_16x16.png"
          sips -z 32 32     "${ICON_SRC}" --out "${ICONSET}/icon_16x16@2x.png"
          sips -z 32 32     "${ICON_SRC}" --out "${ICONSET}/icon_32x32.png"
          sips -z 64 64     "${ICON_SRC}" --out "${ICONSET}/icon_32x32@2x.png"
          sips -z 128 128   "${ICON_SRC}" --out "${ICONSET}/icon_128x128.png"
          sips -z 256 256   "${ICON_SRC}" --out "${ICONSET}/icon_128x128@2x.png"
          sips -z 256 256   "${ICON_SRC}" --out "${ICONSET}/icon_256x256.png"
          sips -z 512 512   "${ICON_SRC}" --out "${ICONSET}/icon_256x256@2x.png"
          sips -z 512 512   "${ICON_SRC}" --out "${ICONSET}/icon_512x512.png"
          sips -z 1024 1024 "${ICON_SRC}" --out "${ICONSET}/icon_512x512@2x.png"
          iconutil -c icns "${ICONSET}" -o "${BUNDLE}/Contents/Resources/AppIcon.icns"

          # Sign the app bundle
          SIGNING_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          codesign --deep --force --verify --verbose \
            --sign "$SIGNING_IDENTITY" \
            --options runtime \
            --entitlements "macos/entitlements.plist" \
            "${BUNDLE}"

          # Create DMG with Applications symlink (drag-to-install)
          mkdir -p dmg-staging
          cp -r "${BUNDLE}" dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "Codirigent" -srcfolder dmg-staging -ov -format UDZO \
            "dist/${{ steps.meta.outputs.archive_name }}.dmg"

          # Sign the DMG
          codesign --force --sign "$SIGNING_IDENTITY" \
            "dist/${{ steps.meta.outputs.archive_name }}.dmg"

      - name: Notarize and staple DMG
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "dist/${{ steps.meta.outputs.archive_name }}.dmg" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --wait
          xcrun stapler staple "dist/${{ steps.meta.outputs.archive_name }}.dmg"

      - name: Clean up keychain
        if: runner.os == 'macOS' && always()
        run: security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

      # ── Upload all artifacts ──────────────────────────────────────────

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          # Exclude MSI — it will be replaced by a locally signed version
          sha256sum $(ls | grep -v '\.msi$') > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "artifacts/*"
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          generateReleaseNotes: true
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}

  cleanup-tag-caches:
    name: Cleanup Tag Caches
    if: always()
    needs: [build, release]
    runs-on: ubuntu-latest
    steps:
      - name: Delete tag-scoped caches
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_REF="${{ github.ref }}"
          ALT_TAG_REF="refs/heads/${TAG_REF}"

          gh cache list \
            --repo "${{ github.repository }}" \
            --limit 5000 \
            --json id,ref \
            --jq ".[] | select(.ref == \"${TAG_REF}\" or .ref == \"${ALT_TAG_REF}\") | .id" |
          while read -r cache_id; do
            [ -n "${cache_id}" ] || continue
            gh cache delete "${cache_id}" --repo "${{ github.repository }}"
          done
