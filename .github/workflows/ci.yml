name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test --all --all-targets

  check-unwraps:
    name: Check for new unwrap() calls
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for new unwrap() calls
        run: |
          # Count unwraps in current branch
          CURRENT=$(git grep -n "\.unwrap()" -- 'crates/*/src/*.rs' | grep -v "tests/" | grep -v "///" | wc -l)

          # Count unwraps in main branch without checking out
          BASELINE=$(git grep -n "\.unwrap()" origin/main -- 'crates/*/src/*.rs' | grep -v "tests/" | grep -v "///" | wc -l)

          echo "Baseline unwraps: $BASELINE"
          echo "Current unwraps: $CURRENT"

          if [ $CURRENT -gt $BASELINE ]; then
            echo "❌ New unwrap() calls detected! ($((CURRENT - BASELINE)) added)"
            echo "Please use safe error handling instead. See docs/coding-guidelines/error-handling.md"
            exit 1
          else
            echo "✅ No new unwrap() calls added"
          fi
