name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check
        run: cargo check --all --all-targets
      - name: Clippy
        run: cargo clippy --all --all-targets -- -D warnings
      - name: Format
        run: cargo fmt --all -- --check

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test --all --all-targets

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release

  check-unwraps:
    name: Check for new unwrap() calls
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for new unwrap() calls
        run: |
          # Count unwraps in current branch
          CURRENT=$(grep -r "\.unwrap()" crates/*/src --include="*.rs" | grep -v "tests/" | grep -v "///" | wc -l)

          # Count unwraps in main branch
          git checkout origin/main
          BASELINE=$(grep -r "\.unwrap()" crates/*/src --include="*.rs" | grep -v "tests/" | grep -v "///" | wc -l)

          echo "Baseline unwraps: $BASELINE"
          echo "Current unwraps: $CURRENT"

          if [ $CURRENT -gt $BASELINE ]; then
            echo "❌ New unwrap() calls detected! ($((CURRENT - BASELINE)) added)"
            echo "Please use safe error handling instead. See docs/coding-guidelines/error-handling.md"
            exit 1
          else
            echo "✅ No new unwrap() calls added"
          fi
