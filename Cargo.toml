[workspace]
resolver = "2"
members = [
    "crates/dirigent-core",
    "crates/dirigent-session",
    "crates/dirigent-detector",
    # TODO: Uncomment when Rust toolchain is upgraded to support 2024 edition
    # "crates/dirigent-ui",
    "crates/dirigent-filetree",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.70"
authors = ["Dirigent Contributors"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/user/dirigent"

[workspace.dependencies]
# Core dependencies
anyhow = "1.0.100"
thiserror = "2.0.18"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tokio = { version = "1.49.0", features = ["full"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.22", features = ["env-filter"] }
chrono = { version = "0.4.43", features = ["serde"] }

# PTY and terminal
portable-pty = "0.8.1"
# TODO: Uncomment when Rust toolchain is upgraded
# alacritty_terminal = "0.25.1"

# Platform-specific
procfs = "0.18.0"
libproc = "0.14.8"
libc = "0.2.180"

# Pattern matching
regex = "1.12.2"

# Async traits
async-trait = "0.1"

# Duration serialization
humantime-serde = "1.1.1"

# Internal crates
dirigent-core = { path = "crates/dirigent-core" }
dirigent-session = { path = "crates/dirigent-session" }
dirigent-detector = { path = "crates/dirigent-detector" }
dirigent-ui = { path = "crates/dirigent-ui" }
dirigent-filetree = { path = "crates/dirigent-filetree" }

# Root package (the main binary)
[package]
name = "dirigent"
description = "AI Coding Agent Orchestration IDE"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true

[[bin]]
name = "dirigent"
path = "src/main.rs"

[dependencies]
dirigent-core.workspace = true
dirigent-session.workspace = true
dirigent-detector.workspace = true
# TODO: Uncomment when Rust toolchain is upgraded
# dirigent-ui.workspace = true
dirigent-filetree.workspace = true
anyhow.workspace = true
tokio.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
